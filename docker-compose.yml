version: "3.9"

# Cairn Phase 4 stack
#
# Services:
#   cairn-api  — FastAPI blackboard server (port 8000)
#   chromadb   — ChromaDB vector store for methodology + vault-notes semantic search (host port 8001)
#   gitlab     — GitLab CE for methodology version control (host port 8080 / 2222)
#   couchdb    — CouchDB for Obsidian LiveSync (host port 5984)
#
# Volumes:
#   cairn_data   — SQLite databases
#   chroma_data  — ChromaDB persistence
#   gitlab_*     — GitLab configuration, logs, and data
#   couchdb_data — CouchDB persistence
#
# Bind mounts:
#   CAIRN_VAULT_PATH (host) → /vault (container) — Obsidian vault directory
#   The vault must be pre-initialised by Obsidian before starting the stack.
#
# Quick start:
#   cp .env.example .env          # fill in CAIRN_GITLAB_TOKEN, CAIRN_GITLAB_PROJECT_ID, CAIRN_VAULT_PATH
#   docker compose up -d
#   docker compose exec cairn-api cairn-admin init-db
#   docker compose exec cairn-api cairn-admin migrate
#   docker compose exec cairn-api cairn-admin agent create --id my-agent --name "My Agent"

services:

  # ---------------------------------------------------------------------------
  # Cairn blackboard API
  # ---------------------------------------------------------------------------
  cairn-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: cairn-api:latest
    container_name: cairn-api
    ports:
      - "8000:8000"
    volumes:
      - cairn_data:/data
      # Obsidian vault bind mount — same path inside container as on host
      # so vault_path in config works consistently.
      - ${CAIRN_VAULT_PATH:-/vault}:/vault
    environment:
      CAIRN_DATA_DIR: /data
      CAIRN_HOST: 0.0.0.0
      CAIRN_PORT: "8000"
      CAIRN_RELOAD: "false"
      # GitLab integration — set these in .env or override here.
      CAIRN_GITLAB_URL: http://gitlab
      CAIRN_GITLAB_TOKEN: ${CAIRN_GITLAB_TOKEN:-}
      CAIRN_GITLAB_PROJECT_ID: ${CAIRN_GITLAB_PROJECT_ID:-}
      CAIRN_GITLAB_METHODOLOGY_DIR: ${CAIRN_GITLAB_METHODOLOGY_DIR:-methodologies}
      CAIRN_GITLAB_WEBHOOK_SECRET: ${CAIRN_GITLAB_WEBHOOK_SECRET:-}
      # ChromaDB — cairn-api connects to chromadb container on its internal port.
      CAIRN_CHROMA_HOST: chromadb
      CAIRN_CHROMA_PORT: "8000"
      CAIRN_CHROMA_COLLECTION: ${CAIRN_CHROMA_COLLECTION:-methodologies}
      # Obsidian vault bridge (Phase 4)
      CAIRN_VAULT_PATH: /vault
      CAIRN_VAULT_COLLECTION: ${CAIRN_VAULT_COLLECTION:-vault-notes}
      CAIRN_CORROBORATION_N: ${CAIRN_CORROBORATION_N:-2}
      CAIRN_CORROBORATION_WINDOW_HOURS: ${CAIRN_CORROBORATION_WINDOW_HOURS:-24}
      CAIRN_PROMOTION_CONFIDENCE_THRESHOLD: ${CAIRN_PROMOTION_CONFIDENCE_THRESHOLD:-0.7}
      # Security
      CAIRN_SECRET_KEY: ${CAIRN_SECRET_KEY:-change-me-in-production}
    depends_on:
      chromadb:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------------------
  # ChromaDB — vector store for methodology and vault-notes semantic discovery
  # ---------------------------------------------------------------------------
  chromadb:
    image: chromadb/chroma:latest
    container_name: cairn-chromadb
    # Host port 8001 to avoid conflict with cairn-api on 8000.
    # Internal containers connect on port 8000 (ChromaDB default).
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      # Persist data to the mounted volume.
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/chroma
      ANONYMIZED_TELEMETRY: "FALSE"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # GitLab CE — methodology version control
  # ---------------------------------------------------------------------------
  gitlab:
    image: gitlab/gitlab-ce:latest
    container_name: cairn-gitlab
    hostname: gitlab
    # HTTP on 8080, HTTPS on 8443, SSH on 2222 (host side).
    # The cairn-api container reaches GitLab on http://gitlab:80 (internal).
    ports:
      - "8080:80"
      - "8443:443"
      - "2222:22"
    volumes:
      - gitlab_config:/etc/gitlab
      - gitlab_logs:/var/log/gitlab
      - gitlab_data:/var/opt/gitlab
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://localhost:8080'
        gitlab_rails['gitlab_shell_ssh_port'] = 2222
        # Reduce memory usage for development.
        puma['worker_processes'] = 2
        sidekiq['concurrency'] = 5
        prometheus_monitoring['enable'] = false
    # GitLab CE takes 2–5 minutes to start on first boot.
    shm_size: "256m"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/-/health"]
      interval: 60s
      timeout: 10s
      retries: 10
      start_period: 300s

  # ---------------------------------------------------------------------------
  # CouchDB — Obsidian LiveSync backend (Phase 4)
  #
  # Obsidian LiveSync uses CouchDB to sync the vault between the container
  # and client devices (laptops, tablets).  Cairn itself only writes files
  # to the bind-mounted vault directory — CouchDB replication is handled
  # entirely by the LiveSync plugin configured in each Obsidian client.
  #
  # Setup (one-time):
  #   1. Access the CouchDB admin UI at http://localhost:5984/_utils
  #   2. Create a database named 'obsidian-vault' (or your preferred name)
  #   3. In Obsidian LiveSync settings, point to http://<host>:5984 with
  #      the credentials set here (COUCHDB_USER / COUCHDB_PASSWORD).
  # ---------------------------------------------------------------------------
  couchdb:
    image: couchdb:3
    container_name: cairn-couchdb
    ports:
      - "5984:5984"
    volumes:
      - couchdb_data:/opt/couchdb/data
    environment:
      COUCHDB_USER: ${COUCHDB_USER:-cairn}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD:-change-me-in-production}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5984/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s


# ---------------------------------------------------------------------------
# Named volumes
# ---------------------------------------------------------------------------
volumes:
  cairn_data:
    driver: local
  chroma_data:
    driver: local
  gitlab_config:
    driver: local
  gitlab_logs:
    driver: local
  gitlab_data:
    driver: local
  couchdb_data:
    driver: local
